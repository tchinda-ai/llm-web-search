services:

  # ── SearXNG — self-hosted meta search engine ───────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  # Same image as the API service — different command, different port.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-web-search
    command: ["streamlit", "run", "app.py",
              "--server.port=8501",
              "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - SEARXNG_URL=http://searxng:8080
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped

  # ── Flask REST API ─────────────────────────────────────────────────────────
  # Same image as the Streamlit app — shares the same core/ business logic.
  # app.py and api.py never import from each other.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-web-search-api
    command: ["python", "api.py"]
    ports:
      - "5005:5005"
    env_file:
      - .env
    environment:
      - SEARXNG_URL=http://searxng:8080
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tchinda-ai

networks:
  tchinda-ai:
    external: true
