services:

  # ── SearXNG — self-hosted meta search engine ───────────────────────────────
  # Queries Google, Bing, Brave, DDG — no API keys, no rate limits.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Streamlit application ──────────────────────────────────────────────────
  # LLM inference is handled by NVIDIA NIM cloud API — no local GPU/model needed.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-web-search
    ports:
      - "8501:8501"
    env_file:
      - .env                          # NVIDIA_API_KEY and NVIDIA_MODEL live here
    environment:
      - SEARXNG_URL=http://searxng:8080
      - ANONYMIZED_TELEMETRY=False
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped
