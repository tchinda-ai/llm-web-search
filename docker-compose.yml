services:

  # ── Ollama LLM server ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── One-shot model downloader ──────────────────────────────────────────────
  # Pulls llama3.1:8b (improved reasoning vs llama3.2:1b) on first run.
  # nomic-embed-text is no longer needed — ChromaDB/embeddings removed.
  model-init:
    image: ollama/ollama:latest
    container_name: model-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/bash", "-c", "ollama pull llama3.1:8b"]
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── SearXNG — self-hosted meta search engine ───────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Streamlit application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-web-search
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - SEARXNG_URL=http://searxng:8080
      - ANONYMIZED_TELEMETRY=False
    depends_on:
      model-init:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
