# SearXNG minimal configuration for local Docker use
use_default_settings: true

server:
  secret_key: "llm-web-search-searxng-secret-key-local"
  limiter: false
  image_proxy: false

search:
  formats:
    - html
    - json
  default_lang: "en-US"
  timeout_limit: 15.0

outgoing:
  request_timeout: 10.0
  connect_timeout: 10.0
  proxies:
    "all://":
      - http://54fbdf522c44f7953be6:cafb6648b70eddf4@gw.dataimpulse.com:823

botdetection:
  ip_lists:
    pass_ip:
      - 172.0.0.0/8
      - 192.168.0.0/16
      - 10.0.0.0/8
      - 127.0.0.0/8
    pass_searxng_org: true

engines:
  - name: google
    disabled: false

  - name: google news
    disabled: false

  - name: bing
    disabled: false

  - name: brave
    disabled: false

  - name: duckduckgo
    disabled: false

  - name: wikipedia
    disabled: false

  - name: wikidata
    disabled: true

  - name: ahmia
    disabled: true

  - name: torch
    disabled: true
